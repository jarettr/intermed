name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

env:
  # Keep Cargo registry access stable on hosted runners; this avoids transient
  # libcurl HTTP/2 framing failures during dependency fetches.
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build (generates man pages)
        run: cargo build
      - name: Man page present
        run: test -f docs/man/intermed.1
      - name: Shell completions present
        run: |
          test -f docs/completions/intermed.bash
          test -f docs/completions/_intermed
          test -f docs/completions/intermed.fish
          test -f docs/completions/_intermed.ps1
      - name: Test
        run: cargo test
      - name: Mod-scale benchmarks (50/100/200 mods)
        run: cargo test -p intermed-cli --test mod_scale_bench -- --nocapture
        env:
          INTERMED_JOBS: "2"

  duckdb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
      - name: DuckDB crate tests
        run: cargo test -p intermed-duckdb --features duckdb
      - name: CLI duckdb e2e
        run: cargo test -p intermed-cli --features duckdb --test duckdb_e2e

  optional-backends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
      - name: DataFusion backend compiles
        run: cargo check -p intermed-columnar --features datafusion-backend
      - name: Polars backend compiles
        run: cargo check -p intermed-columnar --features polars-backend
      - name: Ascent backend compiles
        run: cargo check -p intermed-columnar --features ascent-backend
      - name: WASM backend tests
        run: cargo test -p intermed-columnar --features wasm

  # Dependency security audit (RustSec advisory DB). Fails the build on a known
  # vulnerability; accepted unmaintained-only advisories are listed in
  # .cargo/audit.toml so the check stays green while a real new advisory surfaces.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  fuzz-smoke:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz smoke targets
        shell: bash
        run: |
          set -euo pipefail
          for target in class_parser deps_semver log_stacktrace resource_ast resource_json runtime_log tiny_mappings; do
            cargo fuzz run "$target" -- -max_total_time=45
          done
