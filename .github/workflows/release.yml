name: Release

# Builds a native binary per platform and attaches it to the GitHub release
# whose tag triggered the run. Source builds need cargo; end users only need the
# attached binary (Rust links a standalone executable — no runtime).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # GitHub-hosted runners occasionally hit libcurl HTTP/2 framing errors while
  # updating the crates.io sparse index. Disable Cargo HTTP multiplexing and
  # allow more network retries so release packaging is not failed by a transient
  # registry fetch.
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  build:
    needs: quality
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default (pure-Rust) binaries — static on Linux, the columnar engine is always available.
          # No Intel macOS (x86_64-apple-darwin): the macos-13 Intel runner is being retired
          # and queues unreliably; Apple Silicon (aarch64) covers modern Macs.
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, name: linux-x86_64, features: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, name: windows-x86_64, features: "" }
          - { os: macos-latest, target: aarch64-apple-darwin, name: macos-aarch64, features: "" }
          # duckdb-enabled binaries (bundled DuckDB C++; adds `--logic duckdb` + `--db`).
          # Linux uses glibc here: bundled DuckDB does not link cleanly against static musl.
          # No Windows duckdb build: DuckDB 1.2's vendored fmt does not compile under the
          # current windows-latest MSVC toolchain (removed stdext::checked_array_iterator).
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, name: linux-x86_64-duckdb, features: "duckdb" }
          - { os: macos-latest, target: aarch64-apple-darwin, name: macos-aarch64-duckdb, features: "duckdb" }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Fully static Linux binary (musl) — runs on any distro with no deps.
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          flags=""
          [ -n "${{ matrix.features }}" ] && flags="--features ${{ matrix.features }}"
          retry() {
            local attempt
            for attempt in 1 2 3; do
              "$@" && return 0
              echo "cargo build failed on attempt ${attempt}; retrying after $((attempt * 10))s" >&2
              sleep $((attempt * 10))
            done
            "$@"
          }
          retry cargo build --release --locked --target ${{ matrix.target }} -p intermed-cli $flags

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="intermed-${GITHUB_REF_NAME}-${{ matrix.name }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/intermed" "$dir/"
          cp -r docs/man docs/completions "$dir/"
          cp README.md LICENSE SECURITY.md CONTRIBUTING.md "$dir/"
          tar -czf "${dir}.tar.gz" "$dir"
          echo "ASSET=${dir}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "intermed-$env:GITHUB_REF_NAME-${{ matrix.name }}"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/intermed.exe" $dir
          Copy-Item -Recurse docs/man, docs/completions $dir
          Copy-Item README.md, LICENSE, SECURITY.md, CONTRIBUTING.md $dir
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
          "ASSET=$dir.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create SHA256SUMS
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          prerelease: true
