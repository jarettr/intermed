# InterMed fact schema — machine-checkable contract.
#
# Every fact kind in `kind::all_kinds()` must appear here exactly once. Kinds
# with `complete = true` have their full attribute set enumerated and typed;
# the schema gate (tests/schema_gate.rs) then requires every attribute a rule
# reads on such a kind to be declared here with a matching type. Kinds with
# `complete = false` are registered but their attributes are not yet pinned —
# tighten them to `true` as each layer is audited.

schema_version = "intermed-fact-schema-v1"

[kind.environment]
subject = "environment"
complete = false

[kind.java_runtime]
subject = "java runtime"
complete = false

